name: 日次GEXデータ自動更新

on:
  # 毎営業日 2回自動実行（JST）
  schedule:
    - cron: '0 23 * * 1-5'   # UTC 23:00 = JST 8:00 月〜金（JPX未公開の可能性あり・失敗してもOK）
    - cron: '10 0 * * 2-6'   # UTC 00:10 = JST 9:10 火〜土（JPX公開後・本番取得）
  # 手動実行ボタン
  workflow_dispatch:
    inputs:
      spot:
        description: '日経225現値（空白=Yahoo Financeから自動取得）'
        required: false
        default: ''
      date:
        description: '取得日付（例: 20260605）空白=前営業日'
        required: false
        default: ''

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber pandas scipy requests

      - name: Download JPX ZIP and process
        run: |
          python - <<'PYEOF'
          import requests, zipfile, io, sys, os
          from datetime import date, timedelta

          # 日付決定
          target_date = os.environ.get("TARGET_DATE", "").strip()
          if not target_date:
              # 前営業日を探す（最大5日前まで）
              d = date.today() - timedelta(days=1)
              for _ in range(5):
                  if d.weekday() < 5:  # 月〜金
                      break
                  d -= timedelta(days=1)
              target_date = d.strftime("%Y%m%d")

          yyyymm = target_date[:6]
          url = f"https://www.jpx.co.jp/automation/markets/statistics-derivatives/daily/files/{yyyymm}/Daily_Report_OSE_{target_date}.zip"
          print(f"Downloading: {url}")

          headers = {"User-Agent": "Mozilla/5.0"}
          resp = requests.get(url, headers=headers, timeout=30)

          if resp.status_code != 200:
              print(f"JPXデータ未公開またはエラー: HTTP {resp.status_code}（8時台は正常）")
              sys.exit(0)  # エラーではなく正常終了（8時実行時はデータ未公開の可能性あり）

          print(f"Downloaded {len(resp.content):,} bytes")

          # ZIPからsiop PDFを取り出す
          with zipfile.ZipFile(io.BytesIO(resp.content)) as zf:
              pdf_files = [n for n in zf.namelist() if "siop" in n.lower() and n.endswith(".pdf")]
              if not pdf_files:
                  print("siop PDF not found in ZIP")
                  sys.exit(1)
              print(f"Using: {pdf_files[0]}")
              raw_pdf = zf.read(pdf_files[0])

          # PDFをdata/temp.pdfに保存
          with open("data/temp.pdf", "wb") as f:
              f.write(raw_pdf)
          print(f"PDF saved ({len(raw_pdf):,} bytes)")
          # 成功フラグを立てる
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write("JPX_OK=true\n")
          PYEOF
        env:
          TARGET_DATE: ${{ github.event.inputs.date }}

      - name: Fetch spot price
        if: env.JPX_OK == 'true'
        run: |
          python - <<'PYEOF'
          import requests, os
          manual = os.environ.get("MANUAL_SPOT", "").strip()
          if manual:
              spot = manual
          else:
              try:
                  url = "https://query1.finance.yahoo.com/v8/finance/chart/%5EN225?interval=1m&range=1d"
                  r = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=5)
                  spot = str(int(r.json()["chart"]["result"][0]["meta"]["regularMarketPrice"]))
              except Exception:
                  spot = "38500"
          print(f"SPOT={spot}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"SPOT={spot}\n")
          PYEOF
        env:
          MANUAL_SPOT: ${{ github.event.inputs.spot }}

      - name: Parse PDF to CSV
        if: env.JPX_OK == 'true'
        run: |
          echo "Using spot: $SPOT"
          python fetch_data.py --pdf data/temp.pdf --spot $SPOT --out data/latest.csv

      - name: Cleanup temp PDF
        if: env.JPX_OK == 'true'
        run: rm -f data/temp.pdf

      - name: Commit and push
        if: env.JPX_OK == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.csv data/archive/
          git diff --staged --quiet || git commit -m "Auto: GEX data $(date '+%Y-%m-%d')"
          git push
